<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; background: #f4f4f4; padding: 20px;">
    <div style="background: #1e3a5f; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
        <h1 style="margin: 0; font-size: 24px;">SkyWings Airways</h1>
    </div>
    <div style="padding: 30px; background: white; border-radius: 0 0 8px 8px;">
        <h2 style="color: #1e3a5f;">Payment Verification</h2>
        <p>Your one-time verification code is:</p>
        <div style="background: #1e3a5f; color: white; font-size: 32px; letter-spacing: 8px;
                    padding: 15px 30px; text-align: center; margin: 20px 0; border-radius: 8px; font-weight: bold;">
            <span th:text="${otp}">123456</span>
        </div>
        <p>This code is valid for <strong th:text="${validMinutes}">5</strong> minutes.</p>
        <p>Do not share this code with anyone.</p>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="color: #888; font-size: 12px;">
            If you did not initiate this payment, please ignore this email.
            This is a simulated transaction — no real payment will be charged.
        </p>
    </div>
</body>
</html>
